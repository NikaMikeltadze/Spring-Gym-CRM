# Local Development Profile
spring.datasource.url=jdbc:h2:mem:gymdb;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always

# Health Check
health.demo.required-users=John.Smith,Sarah.Williams
