# Base Application Configuration
# Active profile can be set via environment variable: SPRING_PROFILES_ACTIVE
# Default profile: local
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# Common configuration shared across all profiles
spring.application.name=gym-main-service
# Actuator base configuration
management.endpoints.web.base-path=/actuator
logging.level.org.springframework.security=DEBUG
security.jwt.secret=4j1ji5gJvs1yH9qedCw7xdiQqXQYc+vICA5qt7S5+W0=
security.jwt.expiration-minutes=60
# CORS policy for API endpoints
security.cors.allowed-origins=http://localhost:3000
security.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
security.cors.allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With
security.cors.exposed-headers=Authorization
security.cors.allow-credentials=false
security.cors.max-age-seconds=3600
# App Registration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
# Resilience4j Circuit Breaker Config
resilience4j.circuitbreaker.instances.workloadClient.sliding-window-size=10
resilience4j.circuitbreaker.instances.workloadClient.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.workloadClient.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.workloadClient.permitted-number-of-calls-in-half-open-state=3
# ActiveMQ Configuration
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
activemq.queue.workload-update=trainer.workload.update.queue
